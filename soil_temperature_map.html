var map = L.map('map',{worldCopyJump:true}).setView([20,0],2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO', maxZoom:19, subdomains:'abcd'
}).addTo(map);

function color(t){
  var stops=[[-10,'#313695'],[0,'#74add1'],[10,'#fee090'],[20,'#f46d43'],[35,'#a50026']];
  if(t<=stops[0][0])return stops[0][1];
  if(t>=stops[stops.length-1][0])return stops[stops.length-1][1];
  for(var i=0;i<stops.length-1;i++){
    var a=stops[i],b=stops[i+1];
    if(t>=a[0]&&t<=b[0]){
      var f=(t-a[0])/(b[0]-a[0]);
      var ca=hex(a[1]),cb=hex(b[1]);
      return rgb(ca[0]+f*(cb[0]-ca[0]),ca[1]+f*(cb[1]-ca[1]),ca[2]+f*(cb[2]-ca[2]));
    }
  }
}
function hex(h){return [parseInt(h.substr(1,2),16),parseInt(h.substr(3,2),16),parseInt(h.substr(5,2),16)];}
function rgb(r,g,b){return 'rgb('+Math.round(r)+','+Math.round(g)+','+Math.round(b)+')';}

DATA.forEach(function(p){
  var lat=p[0],lon=p[1],t=p[2];
  L.circleMarker([lat,lon],{
    radius:5,fillColor:color(t),color:'#333',weight:.5,opacity:1,fillOpacity:.85
  }).addTo(map).bindPopup(
    '<b>'+t.toFixed(2)+' &deg;C</b><br/>Lat: '+lat.toFixed(4)+'<br/>Lon: '+lon.toFixed(4)
  );
});

var legend=L.control({position:'bottomright'});
legend.onAdd=function(){
  var div=L.DomUtil.create('div','legend');
  div.innerHTML='<b>Temp (&deg;C)</b><br/>';
  [[-10,'-10'],[0,'0'],[10,'10'],[20,'20'],[35,'35']].forEach(function(s){
    div.innerHTML+='<i style="background:'+color(s[0])+'"></i>'+s[1]+'<br/>';
  });
  return div;
};
legend.addTo(map);
